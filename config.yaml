# VoiceTyper 配置文件

# 模型配置
model:
  # 可选: paraformer-zh, paraformer-en, SenseVoiceSmall
  name: "paraformer-zh"
  # 流式模型 (当录音超过阈值时使用)
  streaming_name: "paraformer-zh-streaming"
  # 标点恢复模型 (可选，设为 null 禁用)
  punc_model: "ct-punc"
  # 设备: mps (Apple Silicon), cpu
  device: "cpu"

# 热键配置
# 支持的修饰键: ctrl, alt, shift, cmd
# 支持的按键: space, tab, a-z, 0-9, f1-f12 等
hotkey:
  # 修饰键列表
  modifiers:
    - "ctrl"
  # 主键
  key: "tab"

# 流式识别配置
streaming:
  # 切换到流式识别的时间阈值 (秒)
  threshold_seconds: 7
  # chunk 大小配置 [0, 10, 5] = 600ms 延迟
  chunk_size: [0, 10, 5]

# 用户自定义词库 (热词)
# 用于提高特定词汇的识别准确率
hotwords:
  - "FunASR"
  - "Anthropic"
  - "Claude"
  - "macOS"
  - "Python"
  # 添加更多自定义词汇...

# UI 配置
ui:
  # 提示窗口透明度 (0.0 - 1.0)
  opacity: 0.85
  # 提示窗口宽度
  width: 240
  # 提示窗口高度
  height: 70