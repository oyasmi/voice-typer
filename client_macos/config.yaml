# VoiceTyper macOS 客户端配置示例

# 语音识别服务地址
# device 由服务端决定；当前服务端运行时支持 cpu / cuda / cuda:N
server:
  host: "127.0.0.1"
  port: 6008
  timeout: 60.0
  api_key: ""  # 设置 API 密钥用于连接远程服务器，本地连接可留空
  llm_recorrect: true  # 是否启用 LLM 修正识别错误（需要服务端支持）

# 热键配置
# 支持的修饰键: ctrl, alt/option, shift, cmd/command
# 支持的按键: space, tab, a-z, 0-9, f1-f12, fn (macOS Fn/地球仪键) 等
# 默认使用单 Fn 键长按录音；使用 fn 键时 modifiers 应为空列表
hotkey:
  modifiers: []
  key: "fn"

# 用户自定义词库 (热词，提高特定词汇识别率)
# 支持多个文件，每个文件每行一个词
# 支持绝对路径或相对路径（相对于配置文件目录）
hotword_files:
  - "hotwords.txt"
  # - "/path/to/custom_words.txt"
  # - "~/Documents/my_hotwords.txt"

# UI 配置
ui:
  opacity: 0.85
  width: 240
  height: 70
