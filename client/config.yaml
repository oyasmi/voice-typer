# VoiceTyper 配置文件

# 模型配置
model:
  # 模型名称：paraformer-zh (中文), paraformer-en (英文), SenseVoiceSmall (多语言)
  name: "paraformer-zh"
  # 标点恢复模型 (设为 null 禁用，可加快启动)
  punc_model: "ct-punc"
  # 设备: mps (Apple Silicon GPU), cpu
  device: "cpu"

# 热键配置
# 支持的修饰键: ctrl, alt/option, shift, cmd/command
# 支持的按键: space, tab, a-z, 0-9, f1-f12 等
hotkey:
  modifiers:
    - "cmd"
  key: "space"

# 用户自定义词库 (热词，提高特定词汇识别率)
# 支持多个文件，每个文件每行一个词
# 支持绝对路径或相对路径（相对于配置文件目录）
hotword_files:
  - "hotwords.txt"
  # - "/path/to/custom_words.txt"
  # - "~/Documents/my_hotwords.txt"

# UI 配置
ui:
  opacity: 0.85
  width: 240
  height: 70